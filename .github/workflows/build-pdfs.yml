# =============================================================================
# Build PDFs — GitHub Actions Workflow
# =============================================================================
# Replaces build-all-tex-to-pdfs.sh with a CI-native pipeline.
#
# Builds every standalone .tex, .plaintex, and .w (CWEB) source in the
# repository into a PDF, then organises the results into a categorised
# PDFs/ directory at the repository root:
#
#   PDFs/
#   ├── cweb/                  CWEB system core documentation
#   ├── cweb-examples/         CWEB example programs
#   ├── graphbase-library/     Stanford GraphBase gb_* library modules
#   └── graphbase-programs/    Stanford GraphBase demo & application programs
#
# The workflow commits the resulting PDFs back to the triggering branch
# and also uploads them as a downloadable Actions artifact.
# =============================================================================

name: Build PDFs

on:
  push:
    branches: [main]
    paths:
      - 'cweb/**'
      - 'graphbase/**'
      - '.github/workflows/build-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    env:
      # TeX engines and tools
      PDFTEX: pdftex
      PDFLATEX: pdflatex
      LATEXMK: latexmk
      CWEAVE: cweave
      # Build behaviour
      TEX_INTERACTION: nonstopmode
      # cwebmac.tex lives in cweb/ — make it findable from any build dir.
      # The trailing colon appends the default TeX search paths.
      TEXINPUTS: ".:${{ github.workspace }}/cweb:${{ github.workspace }}/cweb/examples:"

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Install TeX Live (includes cweave/ctangle via texlive-binaries)
      # -----------------------------------------------------------------------
      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-base \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-plain-generic \
            latexmk \
            build-essential

      # -----------------------------------------------------------------------
      # 2b. Verify CWEB tools — build from source if not found
      # -----------------------------------------------------------------------
      #   cweave and ctangle normally ship inside texlive-binaries (a
      #   dependency of texlive-base).  If the runner image strips them or
      #   the package version is too old, we fall back to building from the
      #   maintained CWEB source (https://github.com/ascherer/cweb).
      #   Build-from-source steps follow the CWEB Installation Guide:
      #     clone → touch *.c → make all → make install
      - name: Ensure cweave and ctangle are available
        run: |
          if command -v cweave >/dev/null 2>&1 && command -v ctangle >/dev/null 2>&1; then
            echo "✓ cweave found at: $(command -v cweave)"
            echo "✓ ctangle found at: $(command -v ctangle)"
          else
            echo "⚠ cweave/ctangle not found in TeX Live — building CWEB from source"
            CWEB_BUILD_DIR="$(mktemp -d)"
            git clone --depth 1 https://github.com/ascherer/cweb.git "$CWEB_BUILD_DIR"
            cd "$CWEB_BUILD_DIR"
            touch *.c
            make -j1 all
            sudo make install
            cd -
            rm -rf "$CWEB_BUILD_DIR"
            echo "✓ cweave installed at: $(command -v cweave)"
            echo "✓ ctangle installed at: $(command -v ctangle)"
          fi

      # -----------------------------------------------------------------------
      # 3. Create output directory structure
      # -----------------------------------------------------------------------
      - name: Create categorised PDF directories
        run: |
          mkdir -p PDFs/cweb
          mkdir -p PDFs/cweb-examples
          mkdir -p PDFs/graphbase-library
          mkdir -p PDFs/graphbase-programs

      # -----------------------------------------------------------------------
      # 4. Build helper functions (shared across steps)
      # -----------------------------------------------------------------------
      - name: Build all documents
        run: |
          set -euo pipefail

          # -------------------------------------------------------------------
          # Counters
          # -------------------------------------------------------------------
          SUCCESSES=0
          FAILURES=0
          SKIPPED=0
          FAILED_LIST=""

          # -------------------------------------------------------------------
          # Helper: detect standalone plain-TeX document
          #   Matches \bye, \end{document}, or \input cwebmac
          # -------------------------------------------------------------------
          is_standalone_tex() {
            grep -qE '\\bye(\s|$|%)|\\end\{document\}|\\input cwebmac' "$1" 2>/dev/null
          }

          # -------------------------------------------------------------------
          # Helper: detect LaTeX (vs plain TeX)
          # -------------------------------------------------------------------
          is_latex() {
            grep -qE '\\documentclass|\\begin\{document\}' "$1" 2>/dev/null
          }

          # -------------------------------------------------------------------
          # Helper: detect standalone CWEB document (has @* section start)
          # -------------------------------------------------------------------
          is_standalone_w() {
            grep -qE '^@\*' "$1" 2>/dev/null
          }

          # -------------------------------------------------------------------
          # Build a plain-TeX file with pdftex (two passes for xrefs).
          # Builds in-place so auxiliary files (.toc, .idx, .scn) stay
          # co-located with the source — then copies only the PDF out.
          #   $1 = source .tex/.plaintex path
          #   $2 = destination directory for the PDF
          # -------------------------------------------------------------------
          build_plaintex() {
            local src="$1" dest="$2"
            local dir base stem

            dir="$(dirname "$src")"
            base="$(basename "$src")"
            stem="${base%.*}"

            echo "::group::Building $src [plain TeX → pdftex]"

            if (
              cd "$dir"
              "$PDFTEX" -interaction="$TEX_INTERACTION" \
                        -halt-on-error \
                        -file-line-error \
                        "$base" && \
              "$PDFTEX" -interaction="$TEX_INTERACTION" \
                        -halt-on-error \
                        -file-line-error \
                        "$base"
            ); then
              if [[ -f "$dir/${stem}.pdf" ]]; then
                cp "$dir/${stem}.pdf" "$dest/${stem}.pdf"
                rm -f "$dir/${stem}.pdf" "$dir/${stem}.log"
                echo "  ✓ $dest/${stem}.pdf"
                SUCCESSES=$((SUCCESSES + 1))
              else
                echo "::error::pdftex succeeded but no PDF produced for $src"
                FAILURES=$((FAILURES + 1))
                FAILED_LIST="${FAILED_LIST}  - ${src}\n"
              fi
            else
              echo "::error::Build failed for $src"
              rm -f "$dir/${stem}.pdf" "$dir/${stem}.log"
              FAILURES=$((FAILURES + 1))
              FAILED_LIST="${FAILED_LIST}  - ${src}\n"
            fi

            echo "::endgroup::"
          }

          # -------------------------------------------------------------------
          # Build a LaTeX file with latexmk or pdflatex fallback.
          # Builds in-place, then copies the PDF out.
          #   $1 = source .tex path
          #   $2 = destination directory for the PDF
          # -------------------------------------------------------------------
          build_latex() {
            local src="$1" dest="$2"
            local dir base stem rc

            dir="$(dirname "$src")"
            base="$(basename "$src")"
            stem="${base%.tex}"

            echo "::group::Building $src [LaTeX → pdflatex]"

            rc=0
            if command -v "$LATEXMK" >/dev/null 2>&1; then
              (
                cd "$dir"
                "$LATEXMK" -pdf \
                           -interaction="$TEX_INTERACTION" \
                           -halt-on-error \
                           -file-line-error \
                           "$base"
              ) || rc=$?
            else
              (
                cd "$dir"
                "$PDFLATEX" -interaction="$TEX_INTERACTION" \
                            -halt-on-error \
                            -file-line-error \
                            "$base" && \
                "$PDFLATEX" -interaction="$TEX_INTERACTION" \
                            -halt-on-error \
                            -file-line-error \
                            "$base"
              ) || rc=$?
            fi

            if [[ -f "$dir/${stem}.pdf" ]]; then
              cp "$dir/${stem}.pdf" "$dest/${stem}.pdf"
              rm -f "$dir/${stem}.pdf" "$dir/${stem}.log" \
                    "$dir/${stem}.aux" "$dir/${stem}.fls" \
                    "$dir/${stem}.fdb_latexmk"
              echo "  ✓ $dest/${stem}.pdf"
              SUCCESSES=$((SUCCESSES + 1))
            else
              echo "::error::Build failed for $src"
              FAILURES=$((FAILURES + 1))
              FAILED_LIST="${FAILED_LIST}  - ${src}\n"
            fi

            echo "::endgroup::"
          }

          # -------------------------------------------------------------------
          # Build a CWEB .w file: cweave → .tex → pdftex.
          # Builds in-place, then copies the PDF out.
          #   $1 = source .w path
          #   $2 = destination directory for the PDF
          # -------------------------------------------------------------------
          build_cweb() {
            local wfile="$1" dest="$2"
            local dir base stem texfile

            dir="$(dirname "$wfile")"
            base="$(basename "$wfile")"
            stem="${base%.w}"
            texfile="$dir/${stem}.tex"

            echo "::group::Building $wfile [CWEB → cweave → pdftex]"

            # Step 1: Weave .w → .tex
            if (
              cd "$dir"
              if [[ -r "${stem}.ch" ]]; then
                "$CWEAVE" "$base" "${stem}.ch"
              else
                "$CWEAVE" "$base"
              fi
            ); then
              :
            else
              # cweave may return non-zero but still produce .tex — check below
              echo "  ⚠ cweave exited non-zero, checking for .tex output…"
            fi

            if [[ ! -f "$texfile" ]]; then
              echo "::error::cweave failed to produce .tex for $wfile"
              FAILURES=$((FAILURES + 1))
              FAILED_LIST="${FAILED_LIST}  - ${wfile} (cweave)\n"
              echo "::endgroup::"
              return 1
            fi

            # Step 2: Compile .tex → .pdf with pdftex (two passes)
            if (
              cd "$dir"
              "$PDFTEX" -interaction="$TEX_INTERACTION" \
                        -halt-on-error \
                        -file-line-error \
                        "${stem}.tex" && \
              "$PDFTEX" -interaction="$TEX_INTERACTION" \
                        -halt-on-error \
                        -file-line-error \
                        "${stem}.tex"
            ); then
              if [[ -f "$dir/${stem}.pdf" ]]; then
                cp "$dir/${stem}.pdf" "$dest/${stem}.pdf"
                rm -f "$dir/${stem}.pdf" "$dir/${stem}.log"
                echo "  ✓ $dest/${stem}.pdf"
                SUCCESSES=$((SUCCESSES + 1))
              else
                echo "::error::pdftex succeeded but no PDF produced for $wfile"
                FAILURES=$((FAILURES + 1))
                FAILED_LIST="${FAILED_LIST}  - ${wfile} (pdftex)\n"
              fi
            else
              echo "::error::pdftex failed for $wfile"
              rm -f "$dir/${stem}.pdf" "$dir/${stem}.log"
              FAILURES=$((FAILURES + 1))
              FAILED_LIST="${FAILED_LIST}  - ${wfile} (pdftex)\n"
            fi

            echo "::endgroup::"
          }

          # -------------------------------------------------------------------
          # Route a .tex file to the correct engine and destination category.
          #   $1 = source .tex path
          #   $2 = destination directory for the PDF
          # -------------------------------------------------------------------
          build_tex_routed() {
            local src="$1" dest="$2"

            if ! is_standalone_tex "$src"; then
              echo "  ⊘ Skipping $src (macro/include file)"
              SKIPPED=$((SKIPPED + 1))
              return 0
            fi

            if is_latex "$src"; then
              build_latex "$src" "$dest"
            else
              build_plaintex "$src" "$dest"
            fi
          }

          # -------------------------------------------------------------------
          # Route a .w file: skip if pre-existing .tex or not standalone.
          #   $1 = source .w path
          #   $2 = destination directory for the PDF
          # -------------------------------------------------------------------
          build_w_routed() {
            local wfile="$1" dest="$2"
            local dir stem

            dir="$(dirname "$wfile")"
            stem="$(basename "$wfile" .w)"

            if ! is_standalone_w "$wfile"; then
              echo "  ⊘ Skipping $wfile (CWEB include file)"
              SKIPPED=$((SKIPPED + 1))
              return 0
            fi

            # If a pre-existing .tex ships with the repo, the .tex step will
            # handle it — skip the .w to avoid building twice.
            if [[ -f "$dir/${stem}.tex" ]]; then
              echo "  ⊘ Skipping $wfile (pre-existing .tex found)"
              SKIPPED=$((SKIPPED + 1))
              return 0
            fi

            build_cweb "$wfile" "$dest"
          }

          # ===================================================================
          #  CWEB CORE (cweb/)
          # ===================================================================
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║  Category: cweb/                             ║"
          echo "╚══════════════════════════════════════════════╝"

          for f in cweb/*.tex; do
            [[ -e "$f" ]] || continue
            build_tex_routed "$f" "PDFs/cweb"
          done

          for f in cweb/*.plaintex; do
            [[ -e "$f" ]] || continue
            build_plaintex "$f" "PDFs/cweb"
          done

          for f in cweb/*.w; do
            [[ -e "$f" ]] || continue
            build_w_routed "$f" "PDFs/cweb"
          done

          # ===================================================================
          #  CWEB EXAMPLES (cweb/examples/)
          # ===================================================================
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║  Category: cweb-examples/                    ║"
          echo "╚══════════════════════════════════════════════╝"

          for f in cweb/examples/*.tex; do
            [[ -e "$f" ]] || continue
            build_tex_routed "$f" "PDFs/cweb-examples"
          done

          for f in cweb/examples/*.w; do
            [[ -e "$f" ]] || continue
            build_w_routed "$f" "PDFs/cweb-examples"
          done

          # ===================================================================
          #  GRAPHBASE LIBRARY (graphbase/gb_*)
          # ===================================================================
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║  Category: graphbase-library/                ║"
          echo "╚══════════════════════════════════════════════╝"

          for f in graphbase/gb_*.tex; do
            [[ -e "$f" ]] || continue
            build_tex_routed "$f" "PDFs/graphbase-library"
          done

          for f in graphbase/gb_*.w; do
            [[ -e "$f" ]] || continue
            build_w_routed "$f" "PDFs/graphbase-library"
          done

          # ===================================================================
          #  GRAPHBASE PROGRAMS (graphbase/ non-gb_* documents)
          # ===================================================================
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║  Category: graphbase-programs/               ║"
          echo "╚══════════════════════════════════════════════╝"

          # .tex files that are NOT gb_* prefixed
          for f in graphbase/*.tex; do
            [[ -e "$f" ]] || continue
            base="$(basename "$f")"
            [[ "$base" == gb_* ]] && continue
            build_tex_routed "$f" "PDFs/graphbase-programs"
          done

          # .plaintex files
          for f in graphbase/*.plaintex; do
            [[ -e "$f" ]] || continue
            build_plaintex "$f" "PDFs/graphbase-programs"
          done

          # .w files that are NOT gb_* prefixed
          for f in graphbase/*.w; do
            [[ -e "$f" ]] || continue
            base="$(basename "$f")"
            [[ "$base" == gb_* ]] && continue
            build_w_routed "$f" "PDFs/graphbase-programs"
          done

          # ===================================================================
          #  Build Summary
          # ===================================================================
          echo ""
          echo "┌──────────────────────────────────────────────┐"
          echo "│              BUILD SUMMARY                    │"
          echo "├──────────────────────────────────────────────┤"
          echo "│  Succeeded : $SUCCESSES"
          echo "│  Skipped   : $SKIPPED"
          echo "│  Failed    : $FAILURES"
          echo "└──────────────────────────────────────────────┘"

          if [[ $FAILURES -gt 0 ]]; then
            echo ""
            echo "Failed documents:"
            echo -e "$FAILED_LIST"
          fi

          # List what was produced
          echo ""
          echo "Generated PDFs:"
          find PDFs/ -name '*.pdf' -type f | sort | while read -r pdf; do
            echo "  • $pdf"
          done

          TOTAL_PDFS=$(find PDFs/ -name '*.pdf' -type f | wc -l)
          echo ""
          echo "Total PDFs produced: $TOTAL_PDFS"

          # Fail the workflow only if zero PDFs were produced
          if [[ "$TOTAL_PDFS" -eq 0 ]]; then
            echo "::error::No PDFs were produced — build failed entirely."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 5. Upload PDFs as a downloadable artifact
      # -----------------------------------------------------------------------
      - name: Upload PDFs artifact
        uses: actions/upload-artifact@v6
        with:
          name: graphbase-cweb-pdfs
          path: PDFs/
          retention-days: 90

      # -----------------------------------------------------------------------
      # 6. Commit PDFs back to the repository
      # -----------------------------------------------------------------------
      - name: Commit PDFs to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add --force PDFs/

          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            TOTAL=$(find PDFs/ -name '*.pdf' -type f | wc -l)
            git commit -m "docs: rebuild ${TOTAL} PDFs [skip ci]" \
                       -m "Auto-generated by build-pdfs workflow."
            git push
          fi